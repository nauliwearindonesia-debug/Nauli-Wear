<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin - Nauli Wear</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

nav{
    background:black;
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav h1{
    font-size:28px;
}

.container{
    padding:40px;
}

.stats{
    display:flex;
    gap:20px;
    margin-bottom:30px;
    flex-wrap:wrap;
}

.card{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    flex:1;
    min-width:250px;
}

.card h2{
    font-size:20px;
    margin-bottom:10px;
    color:#555;
}

.card p{
    font-size:35px;
    font-weight:bold;
}

.table-box{
    background:white;
    border-radius:15px;
    overflow-x:auto;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:900px;
}

th{
    background:black;
    color:white;
    padding:15px;
}

td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f1f1f1;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 20px;
    background:black;
    color:white;
    text-decoration:none;
    border-radius:10px;
}

.btn:hover{
    background:#333;
}

.loading{
    text-align:center;
    padding:30px;
    color:#666;
}
</style>

</head>
<body>

<nav>
    <h1>Dashboard Admin</h1>
</nav>

<div class="container">

<div class="stats">
<div class="card">
<h2>Total Pesanan</h2>
<p id="totalPesanan">0</p>
</div>
</div>

<div class="table-box">

<table>

<thead>

<tr>
<th>ID</th>
<th>Nama</th>
<th>Produk</th>
<th>Ukuran</th>
<th>Warna</th>
<th>No HP</th>
<th>Pembayaran</th>
<th>Alamat</th>
<th>Rating</th>
</tr>

</thead>

<tbody id="tableBody">

<tr>
<td colspan="9" class="loading">
Memuat data...
</td>
</tr>

</tbody>

</table>

</div>

<a href="index.html" class="btn">
← Kembali ke Home
</a>

</div>

<script>

async function loadDashboard(){

    try{

        const response = await fetch("/api/dashboard");

        const result = await response.json();

        if(!result.success){

            alert(result.message);
            return;

        }

        document.getElementById("totalPesanan").innerText=result.total;

        const tbody=document.getElementById("tableBody");

        tbody.innerHTML="";

        result.data.forEach(function(item){

            let rating="";

            for(let i=1;i<=5;i++){

                if(i<=item.rating){

                    rating+="⭐";

                }else{

                    rating+="☆";

                }

            }

            tbody.innerHTML+=`
            <tr>

            <td>${item.id}</td>

            <td>${item.nama}</td>

            <td>${item.produk}</td>

            <td>${item.ukuran ?? "-"}</td>

            <td>${item.warna ?? "-"}</td>

            <td>${item.hp}</td>

            <td>${item.pembayaran}</td>

            <td>${item.alamat}</td>

            <td>${rating}</td>

            </tr>
            `;

        });

    }catch(err){

        console.log(err);

        document.getElementById("tableBody").innerHTML=`
        <tr>
            <td colspan="9">
                Gagal mengambil data dashboard
            </td>
        </tr>
        `;

    }

}

loadDashboard();

</script>

</body>
</html>
